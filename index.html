<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>花火AR Pro GPS・標高・山被り強化版</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;background:#0f172a;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
#map{height:100vh;width:100%}
.panel{position:absolute;z-index:1000;top:10px;left:10px;width:440px;max-width:calc(100vw - 20px);max-height:calc(100vh - 20px);overflow:auto;background:rgba(15,23,42,.96);border:1px solid #334155;border-radius:14px;padding:12px;box-shadow:0 12px 40px rgba(0,0,0,.35)}
h2{font-size:18px;margin:0 0 10px}
label{display:block;margin-top:8px;font-size:12px;color:#cbd5e1}
input,select,textarea,button{width:100%;margin-top:4px;padding:8px;border-radius:8px;border:1px solid #475569;background:#020617;color:#fff;font-size:13px}
textarea{min-height:115px;font-family:monospace}
button{border:none;background:#2563eb;font-weight:700;cursor:pointer}
.secondary{background:#334155}.danger{background:#b91c1c}.green{background:#15803d}.warnbtn{background:#b45309}
.row{display:grid;grid-template-columns:1fr 1fr;gap:8px}.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.result{white-space:pre-wrap;background:#020617;border-radius:8px;padding:8px;margin-top:10px;font-size:12px;line-height:1.55}
.ok{color:#86efac;font-weight:700}.ng{color:#fca5a5;font-weight:700}.warn{color:#fde68a;font-weight:700}.small{font-size:11px;color:#94a3b8;line-height:1.4}
#ar{position:absolute;right:10px;top:10px;width:min(38vw,430px);aspect-ratio:9/16;border:4px solid #fff;border-radius:26px;overflow:hidden;z-index:900;background:#111827;pointer-events:none;box-shadow:0 18px 60px rgba(0,0,0,.45)}
#video{width:100%;height:100%;object-fit:cover;background:#111827}
.linev,.lineh{position:absolute;background:rgba(255,255,255,.25)}
.linev{top:0;bottom:0;width:1px}.lineh{left:0;right:0;height:1px}
.v1{left:33.333%}.v2{left:66.666%}.h1{top:33.333%}.h2{top:66.666%}
.cross{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:34px;text-shadow:0 2px 6px #000}
.ridge{position:absolute;left:0;right:0;top:60%;border-top:2px solid #ef4444;filter:drop-shadow(0 0 4px #000)}
.dot{position:absolute;border:2px solid #22c55e;border-radius:50%;transform:translate(-50%,-50%);font-size:10px;text-align:center;white-space:pre-line;color:#bbf7d0;background:rgba(34,197,94,.12);display:flex;align-items:center;justify-content:center;text-shadow:0 2px 4px #000}
.dot.ng{border-color:#ef4444;color:#fecaca;background:rgba(239,68,68,.12)}
.dot.warn{border-color:#eab308;color:#fef08a;background:rgba(234,179,8,.12)}
.fan{position:absolute;height:2px;background:#facc15;transform-origin:left center;filter:drop-shadow(0 0 4px #000)}
.windghost{position:absolute;border:1px dashed rgba(148,163,184,.9);border-radius:50%;transform:translate(-50%,-50%);color:#cbd5e1;background:rgba(148,163,184,.08);font-size:9px;display:flex;align-items:center;justify-content:center}
.specialdot{position:absolute;border:2px solid #a78bfa;border-radius:50%;transform:translate(-50%,-50%);background:rgba(167,139,250,.12);color:#ddd6fe;font-size:9px;display:flex;align-items:center;justify-content:center;text-shadow:0 2px 4px #000}
.timelinebar{height:8px;background:#334155;border-radius:999px;overflow:hidden;margin-top:6px}
.timelinebar div{height:100%;width:0%;background:#38bdf8}
.hud{position:absolute;left:8px;right:8px;bottom:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:11px}
.hud div{background:rgba(15,23,42,.75);border:1px solid rgba(255,255,255,.18);border-radius:8px;padding:5px;text-align:center}
@media(max-width:800px){.panel{position:relative;top:auto;left:auto;width:100%;max-height:none;border-radius:0}#map{height:68vh}#ar{width:42vw;top:78px}}
.shootbar{display:none}
.panelToggle{display:none}
.uiModeBox{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.uiModeBox button{font-size:12px;padding:7px 4px}
body.forceLandscape #map{height:100vh;width:100vw}
body.forceLandscape .panel{
  position:absolute;left:8px;top:8px;width:330px;max-height:calc(100vh - 16px);
  transform:translateX(-105%);transition:.25s;opacity:.96;
}
body.forceLandscape .panel.open{transform:translateX(0)}
body.forceLandscape .panelToggle{
  display:block;position:absolute;z-index:1200;left:8px;top:8px;width:auto;
  padding:10px 12px;border-radius:999px;background:rgba(15,23,42,.88);
  border:1px solid rgba(255,255,255,.25);color:white;
}
body.forceLandscape #ar{
  right:8px;top:8px;width:58vw;height:calc(100vh - 70px);aspect-ratio:auto;border-radius:18px;
}
body.forceLandscape .shootbar{
  display:grid;grid-template-columns:repeat(5,1fr);gap:6px;position:absolute;z-index:1100;
  left:8px;right:8px;bottom:8px;background:rgba(15,23,42,.78);
  border:1px solid rgba(255,255,255,.18);border-radius:14px;padding:6px;
}
body.forceLandscape .shootbar button{font-size:12px;padding:9px 4px;border-radius:10px;margin:0}

body.forcePortrait .panel{position:relative;top:auto;left:auto;width:100%;max-height:none;border-radius:0;transform:none!important}
body.forcePortrait #map{height:68vh}
body.forcePortrait #ar{width:42vw;top:78px;right:10px;height:auto;aspect-ratio:9/16;border-radius:26px}
body.forcePortrait .shootbar{display:none}
body.forcePortrait .panelToggle{display:none}
@media (orientation: landscape) and (max-height:520px){
  body{overflow:hidden}
  #map{height:100vh;width:100vw}
  .panel{
    position:absolute;
    left:8px;
    top:8px;
    width:330px;
    max-height:calc(100vh - 16px);
    transform:translateX(-105%);
    transition:.25s;
    opacity:.96;
  }
  .panel.open{transform:translateX(0)}
  .panelToggle{
    display:block;
    position:absolute;
    z-index:1200;
    left:8px;
    top:8px;
    width:auto;
    padding:10px 12px;
    border-radius:999px;
    background:rgba(15,23,42,.88);
    border:1px solid rgba(255,255,255,.25);
    color:white;
  }
  #ar{
    right:8px;
    top:8px;
    width:58vw;
    height:calc(100vh - 70px);
    aspect-ratio:auto;
    border-radius:18px;
  }
  .shootbar{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:6px;
    position:absolute;
    z-index:1100;
    left:8px;
    right:8px;
    bottom:8px;
    background:rgba(15,23,42,.78);
    border:1px solid rgba(255,255,255,.18);
    border-radius:14px;
    padding:6px;
  }
  .shootbar button{
    font-size:12px;
    padding:9px 4px;
    border-radius:10px;
    margin:0;
  }
  .hud{font-size:12px}
}
@supports(padding:max(0px)){
  .shootbar{padding-bottom:max(6px,env(safe-area-inset-bottom))}
  .panelToggle{margin-top:env(safe-area-inset-top)}
}
</style>
</head>
<body>
<button class="panelToggle" onclick="togglePanel()">☰ 設定</button>

<div id="map"></div>

<div class="panel">
<h2>花火AR Pro GPS・標高強化版</h2>
<div class="uiModeBox">
<button class="secondary" onclick="setUiMode('auto')">自動UI</button>
<button class="secondary" onclick="setUiMode('portrait')">縦UI</button>
<button class="secondary" onclick="setUiMode('landscape')">横UI</button>
</div>

<div class="row">
<div><label>撮影緯度</label><input id="camLat" value="35.011600"></div>
<div><label>撮影経度</label><input id="camLng" value="135.768100"></div>
</div>

<div class="row3">
<div><label>焦点距離mm</label><input id="focal" value="35"></div>
<div><label>構図</label><select id="orient"><option value="portrait">縦</option><option value="landscape">横</option></select></div>
<div><label>カメラ仰角°</label><input id="pitch" value="8"></div>
</div>

<div class="row">
<div><label>センサー幅mm</label><input id="sw" value="36"></div>
<div><label>センサー高mm</label><input id="sh" value="24"></div>
</div>

<div class="row">
<button class="green" onclick="useGps()">GPS現在地を撮影場所にする</button>
<button class="secondary" onclick="mode='camera'">地図クリックで撮影場所</button>
</div>

<div class="row">
<button onclick="moveCamera()">撮影位置へ移動</button>
<button class="green" onclick="autoSetPitch()">標高から仰角を自動計算</button>
</div>

<div class="row">
<button class="warnbtn" onclick="refreshElevations()">標高を再取得</button>
<button class="secondary" onclick="clearElevationCache()">標高キャッシュ削除</button>
</div>

<label>背景地図</label>
<select id="base" onchange="changeBase()">
<option value="osm">地図</option>
<option value="photo">航空写真</option>
</select>

<label>筒場CSV</label>
<div class="small">形式：筒場名,緯度,経度,号数リスト,トラの尾号数リスト,花火幅m<br>例：A,35.015,135.780,10|20|30,2|4|6,600</div>
<textarea id="csv">A,35.015000,135.780000,10|20|30,2|4|6,600
B,35.018000,135.786000,8|10|15,3|5,450
C,35.011000,135.790000,20|30|40,4|6|8|10,900</textarea>

<div class="row">
<button onclick="loadSites()">CSV読込</button>
<button class="secondary" onclick="mode='site'">地図クリックで筒場追加</button>
</div>

<div class="row3">
<div><label>追加号数</label><select id="addShell"></select></div>
<div><label>追加トラ</label><select id="addTiger"></select></div>
<div><label>追加幅m</label><input id="addWidth" value="500"></div>
</div>

<label>見切れ・遮蔽物判定</label>
<div class="row3">
<div><label>手動稜線仰角°</label><input id="ridge" value="2.0"></div>
<div><label>遮蔽物高さm</label><input id="obs" value="0"></div>
<div><label>余裕角°</label><input id="margin" value="1.0"></div>
</div>

<div class="row">
<div><label>稜線モード</label><select id="ridgeMode"><option value="auto">実地形＋手動稜線</option><option value="manual">手動稜線のみ</option></select></div>
<div><label>上下判定</label><select id="vJudge"><option value="full">上下完全に入れる</option><option value="top">頂点だけ入れば可</option></select></div>
</div>

<div class="row">
<div><label>稜線判定</label><select id="ridgeJudge"><option value="bottom">花火下端で判定</option><option value="center">中心で判定</option><option value="top">頂点で判定</option></select></div>
<div><label>GPS精度</label><input id="gpsAccuracy" value="---" readonly></div>
</div>

<div class="row">
<button class="warnbtn" onclick="fitAll()">全体表示</button>
<button class="danger" onclick="clearSites()">筒場削除</button>
</div>
<label>風流れ・時系列</label>
<div class="row3">
<div><label>風向</label><select id="windDir"><option value="0">北</option><option value="45">北東</option><option value="90">東</option><option value="135">南東</option><option value="180">南</option><option value="225">南西</option><option value="270">西</option><option value="315">北西</option></select></div>
<div><label>風速m/s</label><input id="windSpeed" value="3"></div>
<div><label>経過秒</label><input id="timeSec" value="8"></div>
</div>
<div class="row">
<button class="green" onclick="playTimeline()">時系列再生</button>
<button class="secondary" onclick="stopTimeline()">停止</button>
</div>
<div class="timelinebar"><div id="timelineFill"></div></div>
<label>専用モデル</label>
<div class="row3">
<div><label>モデル</label><select id="specialModel"><option value="none">なし</option><option value="senrin">彩色千輪</option><option value="phoenix">フェニックス</option></select></div>
<div><label>横幅m</label><input id="specialWidth" value="2000"></div>
<div><label>点数</label><input id="specialCount" value="12"></div>
</div>
<div class="row">
<button class="green" onclick="applySpecialModel()">専用モデルを筒場へ追加</button>
<button class="secondary" onclick="clearSpecialModel()">専用モデル削除</button>
</div>



<div class="row">
<button onclick="startCamera()">カメラ開始</button>
<button class="secondary" onclick="stopCamera()">カメラ停止</button>
</div>

<label>プリセット名</label>
<input id="presetName" value="default">
<div class="row3">
<button class="green" onclick="savePreset()">保存</button>
<button class="secondary" onclick="loadPreset()">読込</button>
<button class="danger" onclick="deletePreset()">削除</button>
</div>

<div class="row">
<button class="green" onclick="exportKml()">KML出力</button>
<button class="secondary" onclick="exportKmz()">KMZ出力</button>
</div>
<label>Blender / DAE連携</label>
<div class="row3">
<div><label>球体分割</label><input id="daeSegments" value="24"></div>
<div><label>縦倍率</label><input id="daeZScale" value="1.0"></div>
<div><label>出力縮尺</label><input id="daeScale" value="1.0"></div>
</div>
<div class="row">
<button class="green" onclick="exportDae()">DAE出力</button>
<button class="secondary" onclick="exportDaeKml()">DAE配置KML出力</button>
</div>

<label>OBSオーバーレイ</label>
<div class="row3">
<div><label>横px</label><input id="obsW" value="1920"></div>
<div><label>縦px</label><input id="obsH" value="1080"></div>
<div><label>線太さ</label><input id="obsLine" value="3"></div>
</div>
<div class="row">
<button class="green" onclick="openObsOverlay()">OBS用HTMLを別窓表示</button>
<button class="secondary" onclick="downloadObsOverlay()">OBS用HTML保存</button>
</div>


<div id="res" class="result">起動待ち</div>
</div>

<div id="ar">
<video id="video" autoplay playsinline muted></video>
<div class="linev v1"></div><div class="linev v2"></div>
<div class="lineh h1"></div><div class="lineh h2"></div>
<div id="ridgeLine" class="ridge"></div>
<div id="specialDots"></div>
<div id="windGhosts"></div>
<div id="fans"></div>
<div id="dots"></div>
<div class="cross">+</div>
<div class="hud"><div id="hudFocal">35mm</div><div id="hudAngle">---</div></div>
</div>

<div class="shootbar">
<button onclick="togglePanel()">設定</button>
<button onclick="useGps()">GPS</button>
<button onclick="autoSetPitch()">仰角</button>
<button onclick="fitAll()">全体</button>
<button onclick="startCamera()">カメラ</button>
</div>

<script>
const R=6371000;
let map,marker,gpsCircle,mode=null,stream=null;
let timelineTimer=null;
let timelineT=0;
let sites=[],layers=[];
let specialSites=[];
let elevationCache={};
let elevationReady=false;
let camElevation=0;

const osm=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'OSM'});
const photo=L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:19,attribution:'Esri'});

function togglePanel(){document.querySelector('.panel').classList.toggle('open')}
let uiMode=localStorage.getItem('fwUiMode')||'auto';
function setUiMode(mode){
  uiMode=mode;
  localStorage.setItem('fwUiMode',mode);
  applyOrientationUi();
}
function d2r(d){return d*Math.PI/180}
function r2d(r){return r*180/Math.PI}
function n360(d){return(d%360+360)%360}
function sdiff(a,b){let d=n360(a-b);return d>180?d-360:d}
function dist(a,b,c,d){const p1=d2r(a),p2=d2r(c),dp=d2r(c-a),dl=d2r(d-b);const x=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function brg(a,b,c,d){const p1=d2r(a),p2=d2r(c),dl=d2r(d-b);const y=Math.sin(dl)*Math.cos(p2);const x=Math.cos(p1)*Math.sin(p2)-Math.sin(p1)*Math.cos(p2)*Math.cos(dl);return n360(r2d(Math.atan2(y,x)))}
function dest(a,b,g,m){const p1=d2r(a),l1=d2r(b),t=d2r(g),x=m/R;const p2=Math.asin(Math.sin(p1)*Math.cos(x)+Math.cos(p1)*Math.sin(x)*Math.cos(t));const l2=l1+Math.atan2(Math.sin(t)*Math.sin(x)*Math.cos(p1),Math.cos(x)-Math.sin(p1)*Math.sin(p2));return[r2d(p2),r2d(l2)]}
function fov(sensor,focal){return r2d(2*Math.atan(sensor/(2*focal)))}
function shellDia(n){return n*32}
function shellHeight(n){return n*30}
function tigerLen(n){return n*55}

function cam(){return{lat:+camLat.value,lng:+camLng.value,f:+focal.value,sw:+sw.value,sh:+sh.value,pitch:+pitch.value,ridge:+ridge.value,obs:+obs.value,margin:+margin.value,elev:camElevation}}
function fovs(){const c=cam();let w=c.sw,h=c.sh;if(orient.value==='portrait'){w=c.sh;h=c.sw}return{h:fov(w,c.f),v:fov(h,c.f),sensorW:w}}
function list(v,min,max){return String(v||'').replaceAll('"','').split('|').map(x=>+x.trim()).filter(x=>!isNaN(x)&&x>=min&&x<=max)}
function maxDia(s){return Math.max(s.width||0,...s.shells.map(shellDia),...s.tigers.map(tigerLen),0)}
function maxHeight(s){return Math.max(...s.shells.map(shellHeight),...s.tigers.map(x=>tigerLen(x)*0.7),0)}

function elevKey(lat,lng){return Number(lat).toFixed(5)+','+Number(lng).toFixed(5)}
async function getElevation(lat,lng){
  const key=elevKey(lat,lng);
  if(elevationCache[key]!==undefined)return elevationCache[key];
  try{
    const url='https://cyberjapandata2.gsi.go.jp/general/dem/scripts/getelevation.php?lon='+lng+'&lat='+lat+'&outtype=JSON';
    const res=await fetch(url);
    const json=await res.json();
    const e=(json.elevation===null||isNaN(json.elevation))?0:Number(json.elevation);
    elevationCache[key]=e;
    return e;
  }catch(err){
    elevationCache[key]=0;
    return 0;
  }
}

async function refreshElevations(){
  res.textContent='標高を取得中...';
  const c=cam();
  camElevation=await getElevation(c.lat,c.lng);
  for(const s of allSites()){
    s.elev=await getElevation(s.lat,s.lng);
  }
  elevationReady=True;
}

async function refreshElevations(){
  res.textContent='標高を取得中...';
  const c=cam();
  camElevation=await getElevation(c.lat,c.lng);
  for(const s of allSites()){
    s.elev=await getElevation(s.lat,s.lng);
  }
  elevationReady=true;
  draw();
}

function clearElevationCache(){
  elevationCache={};
  camElevation=0;
  sites.forEach(s=>s.elev=0);
  elevationReady=false;
  draw();
  alert('標高キャッシュを削除しました');
}

async function autoSetPitch(){
  if(!sites.length){alert('筒場を先に読み込んでください');return}
  await refreshElevations();
  const c=cam();
  let sum=0;
  for(const s of targetSites){
    const d=dist(c.lat,c.lng,s.lat,s.lng);
    const h=maxHeight(s);
    const angle=r2d(Math.atan2((s.elev||0)+h-camElevation,Math.max(d,1)));
    sum+=angle;
  }
  const avg=sum/sites.length;
  pitch.value=avg.toFixed(2);
  draw();
  alert('仰角を自動設定しました\\n撮影場所標高: '+camElevation.toFixed(1)+'m\\n平均仰角: '+avg.toFixed(2)+'°');
}

function useGps(){
  if(!navigator.geolocation){
    alert('この端末/ブラウザはGPSに対応していません');
    return;
  }
  res.textContent='GPS取得中...';
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude;
    const lng=pos.coords.longitude;
    const acc=pos.coords.accuracy;
    camLat.value=lat.toFixed(6);
    camLng.value=lng.toFixed(6);
    gpsAccuracy.value=Math.round(acc)+'m';
    marker.setLatLng([lat,lng]);
    if(gpsCircle)map.removeLayer(gpsCircle);
    gpsCircle=L.circle([lat,lng],{radius:acc,color:'#38bdf8',fillColor:'#38bdf8',fillOpacity:.12}).addTo(map);
    map.setView([lat,lng],16);
    refreshElevations();
  },err=>{
    alert('GPS取得に失敗しました。HTTPS、位置情報許可、端末GPSを確認してください。');
    res.textContent='GPS取得失敗';
  },{enableHighAccuracy:true,timeout:15000,maximumAge:0});
}

function init(){
  for(let i=2;i<=40;i++)addShell.add(new Option(i+'号',i,i===10,i===10));
  for(let i=2;i<=10;i++)addTiger.add(new Option(i+'号',i,i===4,i===4));

  map=L.map('map',{layers:[osm]}).setView([35.0116,135.7681],13);

      marker.setLatLng([e.latlng.lat,e.latlng.lng]);
      mode=null;

      refreshElevations();

function changeBase(){
  if(base.value==='osm'){map.removeLayer(photo);map.addLayer(osm)}
  else{map.removeLayer(osm);map.addLayer(photo)}
}

function moveCamera(){
  marker.setLatLng([+camLat.value,+camLng.value]);
  map.setView([+camLat.value,+camLng.value],15);
  draw();
  refreshElevations();
}
