<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>花火AR Pro Auto Pitch</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#0f172a;
  color:#fff;
  font-family:system-ui,sans-serif;
}

#map{
  height:100vh;
}

.panel{
  position:absolute;
  z-index:1000;
  top:10px;
  left:10px;
  width:430px;
  max-width:calc(100vw - 20px);
  max-height:calc(100vh - 20px);
  overflow:auto;
  background:rgba(15,23,42,.96);
  border:1px solid #334155;
  border-radius:14px;
  padding:12px;
}

label{
  display:block;
  margin-top:8px;
  font-size:12px;
  color:#cbd5e1;
}

input,
select,
textarea,
button{
  width:100%;
  margin-top:4px;
  padding:8px;
  border-radius:8px;
  border:1px solid #475569;
  background:#020617;
  color:#fff;
}

textarea{
  min-height:120px;
  font-family:monospace;
}

button{
  border:none;
  background:#2563eb;
  font-weight:700;
}

.secondary{
  background:#334155;
}

.green{
  background:#15803d;
}

.danger{
  background:#b91c1c;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.row3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

.result{
  white-space:pre-wrap;
  background:#020617;
  border-radius:8px;
  padding:8px;
  margin-top:10px;
  font-size:12px;
  line-height:1.55;
}

.ok{
  color:#86efac;
  font-weight:700;
}

.ng{
  color:#fca5a5;
  font-weight:700;
}

#ar{
  position:absolute;
  right:10px;
  top:10px;
  width:min(38vw,430px);
  aspect-ratio:9/16;
  border:4px solid #fff;
  border-radius:26px;
  overflow:hidden;
  z-index:900;
  background:#111827;
}

#video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.cross{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:34px;
}

.dot{
  position:absolute;
  border:2px solid #22c55e;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

.ridge{
  position:absolute;
  left:0;
  right:0;
  top:60%;
  border-top:2px solid #ef4444;
}

</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

<h2>花火AR Pro</h2>

<div class="row">

<div>
<label>撮影緯度</label>
<input id="camLat" value="35.011600">
</div>

<div>
<label>撮影経度</label>
<input id="camLng" value="135.768100">
</div>

</div>

<div class="row3">

<div>
<label>焦点距離mm</label>
<input id="focal" value="35">
</div>

<div>
<label>構図</label>
<select id="orient">
<option value="portrait">縦</option>
<option value="landscape">横</option>
</select>
</div>

<div>
<label>カメラ仰角°</label>
<input id="pitch" value="8">
</div>

</div>

<div class="row">

<div>
<label>センサー幅</label>
<input id="sw" value="36">
</div>

<div>
<label>センサー高</label>
<input id="sh" value="24">
</div>

</div>

<div class="row">

<button class="secondary" onclick="mode='camera'">
地図クリックで撮影場所追加
</button>

<button onclick="moveCamera()">
撮影位置へ移動
</button>

</div>

<button class="green" onclick="autoSetPitch()">
標高から仰角を自動計算
</button>

<label>背景地図</label>

<select id="base" onchange="changeBase()">
<option value="osm">地図</option>
<option value="photo">航空写真</option>
</select>

<label>筒場CSV</label>

<textarea id="csv">A,35.015000,135.780000,10|20|30,2|4|6,600
B,35.018000,135.786000,8|10|15,3|5,450</textarea>

<div class="row">

<button onclick="loadSites()">
CSV読込
</button>

<button class="secondary" onclick="mode='site'">
地図クリックで筒場追加
</button>

</div>

<div class="row3">

<div>
<label>追加号数</label>
<select id="addShell"></select>
</div>

<div>
<label>追加トラ</label>
<select id="addTiger"></select>
</div>

<div>
<label>幅m</label>
<input id="addWidth" value="500">
</div>

</div>

<label>遮蔽物・山被り判定</label>

<div class="row3">

<div>
<label>稜線仰角°</label>
<input id="ridge" value="2.0">
</div>

<div>
<label>遮蔽物高さm</label>
<input id="obs" value="0">
</div>

<div>
<label>余裕角°</label>
<input id="margin" value="1.0">
</div>

</div>

<div id="res" class="result">
起動待ち
</div>

</div>

<div id="ar">

<video id="video" autoplay playsinline muted></video>

<div id="ridgeLine" class="ridge"></div>

<div id="dots"></div>

<div class="cross">+</div>

</div>

<script>

const R = 6371000;

let map;
let marker;
let sites = [];
let layers = [];
let mode = null;
let stream = null;

const osm = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
  maxZoom:19
}
);

const photo = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
  maxZoom:19
}
);

function d2r(d){
  return d * Math.PI / 180;
}

function r2d(r){
  return r * 180 / Math.PI;
}

function n360(d){
  return (d % 360 + 360) % 360;
}

function sdiff(a,b){
  let d = n360(a-b);
  return d > 180 ? d - 360 : d;
}

function dist(a,b,c,d){

  const p1 = d2r(a);
  const p2 = d2r(c);

  const dp = d2r(c-a);
  const dl = d2r(d-b);

  const x =
    Math.sin(dp/2)**2 +
    Math.cos(p1) *
    Math.cos(p2) *
    Math.sin(dl/2)**2;

  return 2 * R * Math.atan2(
    Math.sqrt(x),
    Math.sqrt(1-x)
  );
}

function brg(a,b,c,d){

  const p1 = d2r(a);
  const p2 = d2r(c);

  const dl = d2r(d-b);

  const y =
    Math.sin(dl) *
    Math.cos(p2);

  const x =
    Math.cos(p1) *
    Math.sin(p2) -
    Math.sin(p1) *
    Math.cos(p2) *
    Math.cos(dl);

  return n360(
    r2d(Math.atan2(y,x))
  );
}

function fov(sensor,focal){
  return r2d(
    2 * Math.atan(sensor/(2*focal))
  );
}

function shellDia(n){
  return n * 32;
}

function shellHeight(n){
  return n * 30;
}

function tigerLen(n){
  return n * 55;
}

function cam(){

  return {

    lat:+camLat.value,
    lng:+camLng.value,

    focal:+focal.value,

    sw:+sw.value,
    sh:+sh.value,

    pitch:+pitch.value,

    ridge:+ridge.value,
    obs:+obs.value,
    margin:+margin.value
  };
}

function list(v,min,max){

  return String(v||'')
    .split('|')
    .map(x=>+x.trim())
    .filter(x=>
      !isNaN(x) &&
      x>=min &&
      x<=max
    );
}

function maxDia(s){

  return Math.max(
    s.width || 0,
    ...s.shells.map(shellDia),
    ...s.tigers.map(tigerLen),
    0
  );
}

function maxHeight(s){

  return Math.max(
    ...s.shells.map(shellHeight),
    ...s.tigers.map(x=>tigerLen(x)*0.7),
    0
  );
}

async function getElevation(lat,lng){

  const url =
    'https://cyberjapandata2.gsi.go.jp/general/dem/scripts/getelevation.php'
    + '?lon=' + lng
    + '&lat=' + lat
    + '&outtype=JSON';

  const res = await fetch(url);

  const json = await res.json();

  if(json.elevation === null){
    return 0;
  }

  return Number(json.elevation);
}

async function autoSetPitch(){

  if(!sites.length){

    alert('筒場を先に読み込んでください');

    return;
  }

  const c = cam();

  const camElev =
    await getElevation(
      c.lat,
      c.lng
    );

  let sum = 0;

  for(const s of sites){

    const siteElev =
      await getElevation(
        s.lat,
        s.lng
      );

    const d =
      dist(
        c.lat,
        c.lng,
        s.lat,
        s.lng
      );

    const h =
      maxHeight(s);

    const angle =
      r2d(
        Math.atan2(
          siteElev + h - camElev,
          Math.max(d,1)
        )
      );

    sum += angle;
  }

  const avg =
    sum / sites.length;

  pitch.value =
    avg.toFixed(2);

  draw();

  alert(
    '仰角を自動設定しました\\n' +
    '撮影場所標高: ' +
    camElev.toFixed(1) + 'm\\n' +
    '仰角: ' +
    avg.toFixed(2) + '°'
  );
}

function init(){

  for(let i=2;i<=40;i++){

    addShell.add(
      new Option(i+'号',i)
    );
  }

  for(let i=2;i<=10;i++){

    addTiger.add(
      new Option(i+'号',i)
    );
  }

  map = L.map('map',{
    layers:[osm]
  }).setView(
    [35.0116,135.7681],
    13
  );

  L.control.layers({
    '地図':osm,
    '航空写真':photo
  }).addTo(map);

  marker = L.marker(
    [35.0116,135.7681],
    {
      draggable:true
    }
  ).addTo(map);

  map.on('click',e=>{

    if(mode==='camera'){

      camLat.value =
        e.latlng.lat.toFixed(6);

      camLng.value =
        e.latlng.lng.toFixed(6);

      marker.setLatLng([
        e.latlng.lat,
        e.latlng.lng
      ]);

      mode = null;

      return;
    }

    if(mode==='site'){

      const name =
        prompt(
          '筒場名',
          'Site'+(sites.length+1)
        );

      if(!name)return;

      sites.push({

        name:name,

        lat:e.latlng.lat,
        lng:e.latlng.lng,

        shells:[+addShell.value],

        tigers:[+addTiger.value],

        width:+addWidth.value

      });

      syncCsv();

      draw();

      mode = null;
    }
  });

  loadSites();
}

function changeBase(){

  if(base.value==='osm'){

    map.removeLayer(photo);

    map.addLayer(osm);

  }else{

    map.removeLayer(osm);

    map.addLayer(photo);
  }
}

function moveCamera(){

  map.setView([
    +camLat.value,
    +camLng.value
  ],15);
}

function loadSites(){

  sites = csv.value
    .split(/\\n+/)
    .map(v=>v.trim())
    .filter(v=>v)
    .map(line=>{

      const c =
        line.split(',');

      return {

        name:c[0],

        lat:+c[1],
        lng:+c[2],

        shells:list(c[3],2,40),

        tigers:list(c[4],2,10),

        width:+c[5]
      };
    });

  draw();
}

function syncCsv(){

  csv.value =
    sites.map(s=>

      [
        s.name,
        s.lat.toFixed(6),
        s.lng.toFixed(6),
        s.shells.join('|'),
        s.tigers.join('|'),
        s.width

      ].join(',')

    ).join('\\n');
}

function clearLayers(){

  layers.forEach(l=>{

    map.removeLayer(l);

  });

  layers = [];
}

function draw(){

  clearLayers();

  dots.innerHTML='';

  sites.forEach(s=>{

    const dia =
      maxDia(s);

    const circle =
      L.circle(
        [s.lat,s.lng],
        {
          radius:dia/2,
          color:'#22c55e',
          fillOpacity:.2
        }
      ).addTo(map);

    layers.push(circle);

    const d =
      document.createElement('div');

    d.className='dot';

    d.style.left =
      (50 + Math.random()*20 - 10)+'%';

    d.style.top =
      (50 + Math.random()*20 - 10)+'%';

    d.style.width='70px';
    d.style.height='70px';

    dots.appendChild(d);
  });

  res.innerHTML =
`筒場数: ${sites.length}

標高自動仰角:
対応

複数筒場:
OK

複数号玉:
OK

トラの尾:
OK`;
}

window.onload = init;

</script>

</body>
</html>
