<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>花火AR Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#0f172a;
  color:#fff;
  font-family:system-ui,sans-serif;
}

#map{
  height:100vh;
}

.panel{
  position:absolute;
  z-index:1000;
  top:10px;
  left:10px;
  width:410px;
  max-width:calc(100vw - 20px);
  max-height:calc(100vh - 20px);
  overflow:auto;
  background:rgba(15,23,42,.96);
  border:1px solid #334155;
  border-radius:14px;
  padding:12px;
}

h2{
  font-size:16px;
  margin:0 0 8px;
}

label{
  display:block;
  font-size:12px;
  color:#cbd5e1;
  margin-top:8px;
}

input,
select,
textarea,
button{
  width:100%;
  margin-top:4px;
  padding:8px;
  border-radius:8px;
  border:1px solid #475569;
  background:#020617;
  color:#fff;
}

textarea{
  min-height:120px;
  font-family:monospace;
}

button{
  background:#2563eb;
  border:none;
  font-weight:700;
}

.secondary{
  background:#334155;
}

.warn{
  background:#b45309;
}

.danger{
  background:#b91c1c;
}

.green{
  background:#15803d;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.row3{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
}

.result{
  white-space:pre-wrap;
  background:#020617;
  border-radius:8px;
  padding:8px;
  margin-top:8px;
  font-size:12px;
  line-height:1.55;
}

.ok{
  color:#86efac;
  font-weight:700;
}

.ng{
  color:#fca5a5;
  font-weight:700;
}

#ar{
  position:absolute;
  right:10px;
  top:10px;
  width:min(38vw,430px);
  aspect-ratio:9/16;
  border:4px solid #fff;
  border-radius:26px;
  overflow:hidden;
  z-index:900;
  background:#111827;
}

#video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.linev,
.lineh{
  position:absolute;
  background:rgba(255,255,255,.25);
}

.linev{
  top:0;
  bottom:0;
  width:1px;
}

.lineh{
  left:0;
  right:0;
  height:1px;
}

.v1{ left:33.3%; }
.v2{ left:66.6%; }

.h1{ top:33.3%; }
.h2{ top:66.6%; }

.cross{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:34px;
}

.dot{
  position:absolute;
  border:2px solid #22c55e;
  border-radius:50%;
  transform:translate(-50%,-50%);
}

@media(max-width:800px){

  .panel{
    position:relative;
    width:100%;
    max-height:none;
    border-radius:0;
  }

  #map{
    height:68vh;
  }

  #ar{
    width:42vw;
    top:78px;
  }
}
</style>
</head>

<body>

<div id="map"></div>

<div class="panel">

<h2>花火AR Pro</h2>

<div class="row">

<div>
<label>撮影緯度</label>
<input id="camLat" value="35.011600">
</div>

<div>
<label>撮影経度</label>
<input id="camLng" value="135.768100">
</div>

</div>

<div class="row3">

<div>
<label>焦点距離mm</label>
<input id="focal" value="35">
</div>

<div>
<label>構図</label>
<select id="orient">
<option value="portrait">縦</option>
<option value="landscape">横</option>
</select>
</div>

<div>
<label>仰角°</label>
<input id="pitch" value="8">
</div>

</div>

<div class="row">

<div>
<label>センサー幅</label>
<input id="sw" value="36">
</div>

<div>
<label>センサー高</label>
<input id="sh" value="24">
</div>

</div>

<label>筒場CSV</label>

<textarea id="csv">A,35.015000,135.780000,10|20|30,2|4|6,600
B,35.018000,135.786000,8|10|15,3|5,450
C,35.011000,135.790000,20|30|40,4|6|8|10,900</textarea>

<div class="row">

<button onclick="loadSites()">CSV読込</button>

<button class="secondary" onclick="mode='site'">
地図クリックで筒場追加
</button>

</div>

<div class="row3">

<div>
<label>追加号数</label>
<select id="addShell"></select>
</div>

<div>
<label>追加トラ</label>
<select id="addTiger"></select>
</div>

<div>
<label>幅m</label>
<input id="addWidth" value="500">
</div>

</div>

<div class="row">

<button onclick="fitAll()">全体表示</button>

<button class="danger" onclick="clearSites()">
筒場削除
</button>

</div>

<div class="row">

<button onclick="startCamera()">カメラ開始</button>

<button class="secondary" onclick="stopCamera()">
カメラ停止
</button>

</div>

<div class="row">

<button class="green" onclick="exportKml()">
KML出力
</button>

<button class="warn" onclick="savePreset()">
プリセット保存
</button>

</div>

<div id="res" class="result">
起動待ち
</div>

</div>

<div id="ar">

<video id="video" autoplay playsinline muted></video>

<div class="linev v1"></div>
<div class="linev v2"></div>

<div class="lineh h1"></div>
<div class="lineh h2"></div>

<div class="cross">+</div>

<div id="dots"></div>

</div>

<script>

const map = L.map('map').setView([35.0116,135.7681],13);

const osm = L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
  maxZoom:19,
  attribution:'OSM'
}
).addTo(map);

const photo = L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{
  maxZoom:19,
  attribution:'Esri'
}
);

L.control.layers(
{
  '地図':osm,
  '航空写真':photo
}).addTo(map);

let sites = [];
let mode = null;
let stream = null;

function init(){

  for(let i=2;i<=40;i++){

    addShell.add(
      new Option(i+'号',i)
    );
  }

  for(let i=2;i<=10;i++){

    addTiger.add(
      new Option(i+'号',i)
    );
  }

  map.on('click',e=>{

    if(mode==='site'){

      const name = prompt(
        '筒場名',
        'Site'+(sites.length+1)
      );

      if(!name)return;

      sites.push({
        name:name,
        lat:e.latlng.lat,
        lng:e.latlng.lng,
        shells:[+addShell.value],
        tigers:[+addTiger.value],
        width:+addWidth.value
      });

      syncCsv();

      draw();

      mode = null;
    }
  });

  loadSites();
}

function loadSites(){

  sites = csv.value
    .split(/\\n+/)
    .map(v=>v.trim())
    .filter(v=>v)
    .map(line=>{

      const c = line.split(',');

      return {

        name:c[0],
        lat:+c[1],
        lng:+c[2],
        shells:c[3].split('|').map(Number),
        tigers:c[4].split('|').map(Number),
        width:+c[5]
      };
    });

  draw();
}

function syncCsv(){

  csv.value = sites.map(s=>

    [
      s.name,
      s.lat.toFixed(6),
      s.lng.toFixed(6),
      s.shells.join('|'),
      s.tigers.join('|'),
      s.width

    ].join(',')

  ).join('\\n');
}

function clearSites(){

  sites = [];

  csv.value = '';

  draw();
}

function draw(){

  document
    .querySelectorAll('.leaflet-interactive')
    .forEach(v=>{});

  dots.innerHTML='';

  sites.forEach(s=>{

    L.circle(
      [s.lat,s.lng],
      {
        radius:s.width/2,
        color:'#22c55e',
        fillOpacity:.2
      }
    ).addTo(map);

    const d = document.createElement('div');

    d.className='dot';

    d.style.left =
      (50 + Math.random()*20 - 10)+'%';

    d.style.top =
      (50 + Math.random()*20 - 10)+'%';

    d.style.width='70px';
    d.style.height='70px';

    dots.appendChild(d);
  });

  res.innerHTML =
`筒場数: ${sites.length}

複数筒場対応:
OK

複数号玉:
OK

トラの尾:
OK

KML出力:
OK`;
}

async function startCamera(){

  try{

    stream =
      await navigator.mediaDevices.getUserMedia({

        video:{
          facingMode:{
            ideal:'environment'
          }
        },

        audio:false
      });

    video.srcObject = stream;

  }catch(e){

    alert('カメラ起動失敗');
  }
}

function stopCamera(){

  if(stream){

    stream.getTracks()
      .forEach(t=>t.stop());

    stream = null;

    video.srcObject = null;
  }
}

function fitAll(){

  if(!sites.length)return;

  map.fitBounds(
    sites.map(s=>[s.lat,s.lng]),
    {
      padding:[40,40]
    }
  );
}

function savePreset(){

  localStorage.setItem(
    'fwPreset',
    JSON.stringify({
      csv:csv.value
    })
  );

  alert('保存しました');
}

function exportKml(){

  let kml =
'<?xml version="1.0" encoding="UTF-8"?>';

  kml +=
'<kml xmlns="http://www.opengis.net/kml/2.2"><Document>';

  sites.forEach(s=>{

    kml +=
`<Placemark>
<name>${s.name}</name>
<Point>
<coordinates>${s.lng},${s.lat},0</coordinates>
</Point>
</Placemark>`;
  });

  kml += '</Document></kml>';

  const blob =
    new Blob(
      [kml],
      {
        type:'application/vnd.google-earth.kml+xml'
      }
    );

  const a =
    document.createElement('a');

  a.href =
    URL.createObjectURL(blob);

  a.download =
    'fireworks_ar.kml';

  a.click();
}

window.onload = init;

</script>

</body>
</html>
