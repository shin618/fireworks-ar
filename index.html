<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>花火AR 画角シミュレーション</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#0f172a;
  color:white;
}
#map{
  height:100vh;
  width:100%;
}
.panel{
  position:absolute;
  top:10px;
  left:10px;
  z-index:1000;
  width:310px;
  max-width:calc(100vw - 20px);
  background:rgba(15,23,42,.92);
  border:1px solid rgba(255,255,255,.18);
  border-radius:14px;
  padding:12px;
  box-shadow:0 12px 40px rgba(0,0,0,.35);
}
.panel h2{
  margin:0 0 8px;
  font-size:16px;
}
label{
  display:block;
  margin-top:8px;
  font-size:12px;
  color:#cbd5e1;
}
input,button,select,textarea{
  width:100%;
  margin-top:4px;
  padding:8px;
  border-radius:9px;
  border:1px solid #475569;
  background:#020617;
  color:white;
  font-size:13px;
}
button{
  background:#2563eb;
  border:none;
  font-weight:700;
  cursor:pointer;
}
button.secondary{background:#334155}
button.warn{background:#b45309}
.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
#ar{
  position:absolute;
  right:10px;
  top:10px;
  width:min(38vw,430px);
  aspect-ratio:9/16;
  border:4px solid white;
  border-radius:26px;
  overflow:hidden;
  z-index:900;
  background:rgba(0,0,0,.25);
  box-shadow:0 18px 60px rgba(0,0,0,.45);
  pointer-events:none;
}
#video{
  width:100%;
  height:100%;
  object-fit:cover;
  background:#111827;
}
.cross{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  font-size:34px;
  font-weight:300;
  text-shadow:0 2px 6px #000;
}
.grid-v,.grid-h{
  position:absolute;
  background:rgba(255,255,255,.28);
}
.grid-v{top:0;bottom:0;width:1px}
.grid-h{left:0;right:0;height:1px}
.v1{left:33.333%}.v2{left:66.666%}
.h1{top:33.333%}.h2{top:66.666%}
.hud{
  position:absolute;
  left:8px;
  right:8px;
  bottom:8px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
  font-size:11px;
}
.hud div{
  background:rgba(15,23,42,.75);
  border:1px solid rgba(255,255,255,.18);
  border-radius:8px;
  padding:5px;
  text-align:center;
}
.firework{
  position:absolute;
  left:50%;
  top:42%;
  width:90px;
  height:90px;
  border:2px solid #22c55e;
  border-radius:50%;
  transform:translate(-50%,-50%);
  color:#bbf7d0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:12px;
  text-shadow:0 2px 4px #000;
}
.info{
  margin-top:8px;
  padding:8px;
  background:#020617;
  border-radius:8px;
  font-size:12px;
  line-height:1.5;
  color:#e5e7eb;
}
.leaflet-control-layers{
  font-size:13px;
}
@media(max-width:800px){
  .panel{
    position:relative;
    top:auto;
    left:auto;
    width:100%;
    max-width:none;
    border-radius:0;
  }
  #map{
    height:68vh;
  }
  #ar{
    width:42vw;
    top:78px;
  }
}
</style>
</head>

<body>
<div id="map"></div>

<div class="panel">
  <h2>花火AR 画角シミュレーション</h2>

  <div class="row">
    <div>
      <label>撮影緯度</label>
      <input id="lat" type="number" step="0.000001" value="35.011600">
    </div>
    <div>
      <label>撮影経度</label>
      <input id="lng" type="number" step="0.000001" value="135.768100">
    </div>
  </div>

  <div class="row">
    <div>
      <label>焦点距離 mm</label>
      <input id="focal" type="number" value="35">
    </div>
    <div>
      <label>構図</label>
      <select id="orientation">
        <option value="portrait">縦</option>
        <option value="landscape">横</option>
      </select>
    </div>
  </div>

  <div class="row">
    <button onclick="moveCamera()">撮影位置へ移動</button>
    <button class="secondary" onclick="setClickMode()">地図クリックで指定</button>
  </div>

  <div class="row">
    <button onclick="startCamera()">カメラ開始</button>
    <button class="secondary" onclick="stopCamera()">カメラ停止</button>
  </div>

  <div class="row">
    <button class="warn" onclick="startSensor()">傾きセンサー開始</button>
    <button class="secondary" onclick="stopSensor()">センサー停止</button>
  </div>

  <label>背景地図</label>
  <select id="basemap" onchange="changeBasemap()">
    <option value="osm">地図</option>
    <option value="photo">航空写真</option>
  </select>

  <div id="info" class="info">
    方位: ---<br>
    仰角: ---<br>
    状態: 起動待ち
  </div>
</div>

<div id="ar">
  <video id="video" autoplay playsinline muted></video>
  <div class="grid-v v1"></div>
  <div class="grid-v v2"></div>
  <div class="grid-h h1"></div>
  <div class="grid-h h2"></div>
  <div class="firework">花火</div>
  <div class="cross">+</div>
  <div class="hud">
    <div id="hudFocal">35mm</div>
    <div id="hudAngle">---</div>
  </div>
</div>

<script>
let map;
let cameraMarker;
let clickMode=false;
let stream=null;
let sensorOn=false;

const osmLayer=L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  maxZoom:19,
  attribution:"&copy; OpenStreetMap"
});

const photoLayer=L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{
  maxZoom:19,
  attribution:"Tiles &copy; Esri"
});

function init(){
  map=L.map("map",{layers:[osmLayer]}).setView([35.0116,135.7681],13);

  L.control.layers({
    "地図":osmLayer,
    "航空写真":photoLayer
  }).addTo(map);

  cameraMarker=L.marker([35.0116,135.7681],{draggable:true}).addTo(map).bindPopup("撮影位置");

  cameraMarker.on("dragend",function(e){
    const p=e.target.getLatLng();
    document.getElementById("lat").value=p.lat.toFixed(6);
    document.getElementById("lng").value=p.lng.toFixed(6);
  });

  map.on("click",function(e){
    if(!clickMode)return;
    document.getElementById("lat").value=e.latlng.lat.toFixed(6);
    document.getElementById("lng").value=e.latlng.lng.toFixed(6);
    moveCamera();
    clickMode=false;
    updateInfo("地図クリックで撮影位置を指定しました");
  });

  updateHud();
}

function changeBasemap(){
  const v=document.getElementById("basemap").value;
  if(v==="osm"){
    map.removeLayer(photoLayer);
    map.addLayer(osmLayer);
  }else{
    map.removeLayer(osmLayer);
    map.addLayer(photoLayer);
  }
}

function moveCamera(){
  const lat=parseFloat(document.getElementById("lat").value);
  const lng=parseFloat(document.getElementById("lng").value);
  if(isNaN(lat)||isNaN(lng)){
    alert("緯度経度を確認してください");
    return;
  }
  cameraMarker.setLatLng([lat,lng]);
  map.setView([lat,lng],15);
}

function setClickMode(){
  clickMode=true;
  updateInfo("地図をタップすると撮影位置を指定します");
}

async function startCamera(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:"environment"}},
      audio:false
    });
    document.getElementById("video").srcObject=stream;
    updateInfo("カメラ起動中");
  }catch(e){
    alert("カメラを開始できません。HTTPS、カメラ許可を確認してください。");
  }
}

function stopCamera(){
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    stream=null;
    document.getElementById("video").srcObject=null;
  }
  updateInfo("カメラ停止");
}

async function startSensor(){
  try{
    if(typeof DeviceOrientationEvent!=="undefined" &&
       typeof DeviceOrientationEvent.requestPermission==="function"){
      const p=await DeviceOrientationEvent.requestPermission();
      if(p!=="granted"){
        alert("モーション/方向センサーが許可されませんでした");
        return;
      }
    }

    sensorOn=true;
    window.addEventListener("deviceorientation",handleOrientation,true);
    updateInfo("傾きセンサー起動中");
  }catch(e){
    alert("傾きセンサーを開始できません。HTTPS、ブラウザ設定を確認してください。");
  }
}

function stopSensor(){
  sensorOn=false;
  window.removeEventListener("deviceorientation",handleOrientation,true);
  updateInfo("傾きセンサー停止");
}

function handleOrientation(e){
  if(!sensorOn)return;

  let heading=0;
  if(typeof e.webkitCompassHeading==="number"){
    heading=e.webkitCompassHeading;
  }else if(typeof e.alpha==="number"){
    heading=360-e.alpha;
  }

  let pitch=0;
  if(typeof e.beta==="number"){
    pitch=e.beta;
  }

  document.getElementById("info").innerHTML=
    "方位: "+heading.toFixed(1)+"°<br>"+
    "仰角: "+pitch.toFixed(1)+"°<br>"+
    "状態: センサー取得中";

  document.getElementById("hudAngle").textContent=
    heading.toFixed(0)+"° / "+pitch.toFixed(0)+"°";
}

function updateInfo(text){
  document.getElementById("info").innerHTML=
    "方位: ---<br>"+
    "仰角: ---<br>"+
    "状態: "+text;
}

function updateHud(){
  const f=document.getElementById("focal").value;
  document.getElementById("hudFocal").textContent=f+"mm";
}

document.getElementById("focal").addEventListener("change",updateHud);

document.getElementById("orientation").addEventListener("change",function(){
  const ar=document.getElementById("ar");
  if(this.value==="landscape"){
    ar.style.aspectRatio="16/9";
    ar.style.width="min(60vw,620px)";
  }else{
    ar.style.aspectRatio="9/16";
    ar.style.width="min(38vw,430px)";
  }
});

window.addEventListener("load",init);
</script>
</body>
</html>
